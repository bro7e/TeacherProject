<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ يوسف الأعجم</title>
    <style>
        :root {
            --primary-color: #1a237e; /* كحلي ملكي */
            --accent-color: #ffd700; /* ذهبي */
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
        }

        .card {
            background: var(--primary-color);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            text-align: center;
            color: white;
            border-top: 5px solid var(--accent-color);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 30px;
            background-color: var(--accent-color);
            color: #1a237e;
            text-decoration: none;
            font-weight: bold;
            border-radius: 50px;
            transition: 0.3s;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>الأستاذ يوسف الأعجم</h1>
        <p>مرحباً بكم في المنصة التعليمية الجديدة - نسخة الاختبار</p>
        <a href="https://wa.me/966502381068" class="btn">تواصل عبر واتساب</a>
    </div>

</body>
</html>
