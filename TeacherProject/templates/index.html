<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ يوسف الأعجم</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #38bdf8; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: var(--card); border-left: 1px solid rgba(255,255,255,0.1); padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .nav-item { padding: 12px; border-radius: 10px; cursor: pointer; transition: 0.3s; display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: var(--bg); font-weight: bold; }
        .main-content { flex: 1; padding: 40px; overflow-y: auto; }
        .hero-card { background: linear-gradient(135deg, #1e293b, #334155); padding: 40px; border-radius: 20px; border: 1px solid rgba(56, 189, 248, 0.3); text-align: center; margin-bottom: 30px; }
        .image-container img { max-width: 100%; border-radius: 15px; margin-top: 20px; border: 2px solid var(--primary); }
        #admin-btn { position: fixed; bottom: 0; left: 0; width: 40px; height: 40px; opacity: 0.05; cursor: pointer; z-index: 999; }
        .admin-panel { display: none; background: #000; padding: 20px; border-radius: 15px; border: 1px solid gold; margin-top: 20px; }
        input, button { padding: 10px; margin: 5px; border-radius: 5px; border: none; }
        .wa-float { position: fixed; bottom: 20px; right: 20px; background: #22c55e; width: 60px; height: 60px; border-radius: 50px; display: flex; justify-content: center; align-items: center; font-size: 30px; color: white; text-decoration: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3 style="color: var(--primary); text-align: center;">المنصة الذكية</h3>
        <div class="nav-item active"><i class="fas fa-home"></i> الواجهة الرئيسية</div>
        <div class="nav-item"><i class="fas fa-book"></i> قواعد البيانات</div>
        <div class="nav-item"><i class="fas fa-file-pdf"></i> الملحقات</div>
    </div>
    <div class="main-content">
        <div class="hero-card">
            <h1>الأستاذ يوسف الأعجم</h1>
            <p>مرحباً بكم في منصتكم التعليمية المتطورة.</p>
        </div>
        <div id="content-list"></div>
        <div id="admin-panel" class="admin-panel">
            <h3>لوحة التحكم (أدمن)</h3>
            <input type="text" id="img-url" placeholder="رابط صورة كبيرة">
            <input type="text" id="link-url" placeholder="رابط خارجي">
            <button onclick="addContent()" style="background:var(--primary); cursor:pointer;">إضافة محتوى</button>
        </div>
    </div>
    <div id="admin-btn" onclick="askPass()"></div>
    <a href="https://wa.me/966502381068" class="wa-float" target="_blank"><i class="fab fa-whatsapp"></i></a>
    <script>
        function askPass() {
            let p = prompt("رمز الأدمن:");
            if(p === "2321") document.getElementById('admin-panel').style.display = 'block';
        }
        function addContent() {
            let img = document.getElementById('img-url').value;
            let lnk = document.getElementById('link-url').value;
            let div = document.createElement('div');
            div.innerHTML = `<div style="background:#334155;padding:15px;margin-top:15px;border-radius:10px;">
                <img src="${img}" style="width:100%;"><br><a href="${lnk}" style="color:cyan;">الرابط المرفق</a></div>`;
            document.getElementById('content-list').appendChild(div);
        }
    </script>
</body>
</html>
