<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ يوسف الأعجم | نظام الإدارة</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --bg: #0f172a; --sidebar: #1e293b; --primary: #38bdf8; --text: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        /* القائمة الجانبية الاحترافية */
        .sidebar { width: 260px; background: var(--sidebar); border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        .sidebar-header { padding: 25px; text-align: center; background: rgba(0,0,0,0.2); }
        .nav-menu { flex: 1; padding: 15px; overflow-y: auto; }
        .nav-item { padding: 12px 15px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #94a3b8; transition: 0.3s; margin-bottom: 5px; text-decoration: none; position: relative; }
        .nav-item:hover, .nav-item.active { background: rgba(56, 189, 248, 0.1); color: var(--primary); }
        
        /* القائمة المنسدلة */
        .submenu { display: none; padding-right: 35px; background: rgba(0,0,0,0.1); border-radius: 8px; margin-bottom: 10px; }
        .submenu-item { padding: 8px; font-size: 0.9rem; color: #64748b; cursor: pointer; transition: 0.2s; }
        .submenu-item:hover { color: white; }
        .has-submenu::after { content: '\f105'; font-family: 'Font Awesome 5 Free'; font-weight: 900; position: absolute; left: 15px; transition: 0.3s; }
        .has-submenu.open::after { transform: rotate(90deg); }

        /* المحتوى */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; background: radial-gradient(circle at 0% 0%, #1e293b 0%, #0f172a 100%); }
        .page { display: none; animation: fadeIn 0.4s ease-in-out; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        
        .card { background: var(--sidebar); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn-admin-secret { position: fixed; bottom: 0; left: 0; width: 30px; height: 30px; opacity: 0; cursor: default; }
        .admin-only { display: none; margin-top: 20px; padding: 20px; border: 2px dashed var(--primary); border-radius: 15px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div style="width: 60px; height: 60px; background: var(--primary); border-radius: 15px; margin: 0 auto 10px; display: flex; align-items: center; justify-content: center;">
                <i class="fas fa-chalkboard-teacher" style="font-size: 2rem; color: #0f172a;"></i>
            </div>
            <h4 style="margin:0;">أ. يوسف الأعجم</h4>
        </div>

        <div class="nav-menu">
            <div class="nav-item active" onclick="changePage('home')"><i class="fas fa-home"></i> الرئيسية</div>
            
            <div class="nav-item has-submenu" onclick="toggleSub(this, 'sub1')"><i class="fas fa-book"></i> المواد الدراسية</div>
            <div id="sub1" class="submenu">
                <div class="submenu-item" onclick="changePage('english')">اللغة الإنجليزية</div>
                <div class="submenu-item" onclick="changePage('it')">علوم الحاسب</div>
                <div class="submenu-item" onclick="changePage('math')">الرياضيات</div>
            </div>

            <div class="nav-item has-submenu" onclick="toggleSub(this, 'sub2')"><i class="fas fa-tasks"></i> الاختبارات</div>
            <div id="sub2" class="submenu">
                <div class="submenu-item">اختبارات دورية</div>
                <div class="submenu-item">النهائي</div>
            </div>
            
            <div class="nav-item" onclick="changePage('files')"><i class="fas fa-file-download"></i> المرفقات</div>
        </div>
    </div>

    <div class="main-content">
        <div id="home" class="page active">
            <div class="card">
                <h1>أهلاً بك في الواجهة الرئيسية</h1>
                <p style="color: #94a3b8;">هذا النظام يدعم إضافة وحذف الصور والروابط الكبيرة لخدمة الطلاب.</p>
                <div id="content-display" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;"></div>
            </div>
        </div>

        <div id="english" class="page">
            <div class="card"><h1>قسم اللغة الإنجليزية</h1><p>هنا تجد شروحات أ. يوسف للقواعد.</p></div>
        </div>

        <div id="adminArea" class="admin-only">
            <h3 style="color: gold;">لوحة التحكم الاحترافية</h3>
            <input type="text" id="itemName" placeholder="اسم الملف/الصورة" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #0f172a; color: white; border: 1px solid #334155;">
            <input type="text" id="itemUrl" placeholder="رابط الصورة المباشر" style="width: 100%; padding: 10px; margin-bottom: 10px; background: #0f172a; color: white; border: 1px solid #334155;">
            <button onclick="publish()" style="background: var(--primary); padding: 10px 20px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">نشر الآن</button>
        </div>
    </div>

    <div class="btn-admin-secret" onclick="login()"></div>

    <script>
        function changePage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            // تمييز العنصر المختار (اختياري)
        }

        function toggleSub(el, id) {
            let sub = document.getElementById(id);
            let isOpen = sub.style.display === "block";
            sub.style.display = isOpen ? "none" : "block";
            el.classList.toggle('open');
        }

        function login() {
            let p = prompt("رمز الدخول:");
            if(p === "2321") {
                document.getElementById('adminArea').style.display = "block";
                alert("تم فتح صلاحيات الأدمن!");
            }
        }

        function publish() {
            let name = document.getElementById('itemName').value;
            let url = document.getElementById('itemUrl').value;
            let display = document.getElementById('content-display');
            
            let item = document.createElement('div');
            item.style = "background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; text-align: center;";
            item.innerHTML = `<img src="${url}" style="width:100%; border-radius:8px; margin-bottom:10px;"><b>${name}</b>`;
            display.appendChild(item);
            alert("تمت الإضافة للرئيسية!");
        }
    </script>
</body>
</html>
