<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ يوسف الأعجم</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a; color: #f8fafc;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center; background: rgba(30, 41, 59, 0.7);
            padding: 2.5rem; border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 450px; width: 90%;
        }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        .admin-section { margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; }
        input { 
            padding: 10px; border-radius: 8px; border: none; 
            width: 80%; text-align: center; font-weight: bold;
        }
        /* زر الواتساب تحت يمين */
        .wa-float {
            position: fixed; bottom: 20px; right: 20px;
            background: #22c55e; color: white;
            width: 60px; height: 60px;
            border-radius: 50px; display: flex;
            justify-content: center; align-items: center;
            font-size: 30px; box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
            z-index: 100; transition: 0.3s;
        }
        .wa-float:hover { transform: scale(1.1); }
        .dev-tag { margin-top: 20px; font-size: 0.7rem; color: #475569; }
    </style>
</head>
<body>

    <div class="container">
        <i class="fas fa-university" style="font-size: 3rem; color: #38bdf8; margin-bottom: 15px;"></i>
        <h1>الأستاذ يوسف الأعجم</h1>
        <p>مرحباً بكم في المنصة التعليمية</p>
        
        <div class="admin-section">
            <p style="font-size: 0.9rem; margin-bottom: 8px;">لوحة الإدارة (أدخل الرمز)</p>
            <input type="password" id="adminPass" placeholder="****">
            <button onclick="checkAdmin()" style="margin-top:10px; cursor:pointer; padding: 5px 15px; border-radius: 5px; border:none; background:#38bdf8; color:#0f172a; font-weight:bold;">دخول</button>
        </div>

        <div class="dev-tag">تم التطوير بواسطة عبد الرحمن 💻</div>
    </div>

    <a href="https://wa.me/966502381068" class="wa-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        function checkAdmin() {
            const pass = document.getElementById('adminPass').value;
            if(pass === "2321") {
                alert("أهلاً بك يا أدمن! تم الدخول بنجاح.");
                // هنا تقدر تحط رابط يفتح صفحة ثانية إذا بغيت
            } else {
                alert("الرمز خطأ!");
            }
        }
    </script>
</body>
</html>
