<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الأستاذ يوسف الأعجم</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a; /* لون ليلي فخم */
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 24px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }

        .icon-box {
            background: #38bdf8;
            width: 80px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1.5rem;
            font-size: 2.5rem;
            color: #0f172a;
        }

        h1 {
            font-size: 2rem;
            margin: 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            color: #94a3b8;
            margin: 1rem 0 2rem;
            line-height: 1.6;
        }

        .btn-whatsapp {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #22c55e;
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-whatsapp:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px -5px rgba(34, 197, 94, 0.5);
        }

        .dev-tag {
            margin-top: 2rem;
            font-size: 0.8rem;
            color: #475569;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon-box">
            <i class="fas fa-user-graduate"></i>
        </div>
        <h1>الأستاذ يوسف الأعجم</h1>
        <p>مرحباً بكم في المنصة التعليمية الذكية. نحن هنا لتقديم أفضل تجربة تعلم بأساليب تقنية حديثة ومبسطة.</p>
        
        <a href="https://wa.me/966502381068" class="btn-whatsapp">
            <i class="fab fa-whatsapp"></i>
            تواصل الآن مع الأستاذ
        </a>

        <div class="dev-tag">تم التطوير بواسطة عبد الرحمن 💻</div>
    </div>

</body>
</html>
